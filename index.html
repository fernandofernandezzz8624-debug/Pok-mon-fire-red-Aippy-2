<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="GBA FireRed">
    <meta name="theme-color" content="#000000">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Pokémon FireRed - GBA Emulator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: #fff;
            position: fixed;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: stretch;
            justify-content: stretch;
        }

        .status-bar {
            background: #1a1a1a;
            padding: 8px 15px;
            font-size: 12px;
            color: #999;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
            flex-shrink: 0;
        }

        .status-left {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .status-right {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .game-title {
            color: #667eea;
            font-weight: bold;
            font-size: 13px;
        }

        /* Pantalla principal */
        .game-screen {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            overflow: hidden;
            position: relative;
        }

        #gbaScreen {
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
            image-rendering: -moz-crisp-edges;
            image-rendering: crisp-edges;
            display: block;
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            z-index: 1000;
        }

        .loading-overlay.hidden {
            display: none;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid #333;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: #999;
            font-size: 14px;
        }

        /* Controles */
        .controls-bar {
            background: linear-gradient(180deg, #1a1a2e 0%, #0f0f1e 100%);
            padding: 10px;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            align-items: center;
            justify-items: center;
            border-top: 2px solid #333;
            flex-shrink: 0;
            min-height: 140px;
        }

        /* D-Pad */
        .dpad-container {
            display: flex;
            flex-direction: column;
            gap: 2px;
            align-items: center;
            justify-content: center;
        }

        .dpad-row {
            display: flex;
            gap: 2px;
        }

        .dpad-btn {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #2a3a4a, #1a2a3a);
            border: 2px solid #444;
            border-radius: 6px;
            color: #4ecdc4;
            font-size: 18px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            active: pointer;
            touch-action: manipulation;
            -webkit-user-select: none;
            user-select: none;
        }

        .dpad-btn:active {
            background: linear-gradient(135deg, #1a2a3a, #0a1a2a);
            transform: scale(0.95);
            border-color: #4ecdc4;
        }

        .dpad-spacer {
            width: 45px;
            height: 45px;
            visibility: hidden;
        }

        /* Botones de acción (A, B) */
        .action-btns {
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: center;
            justify-content: center;
        }

        .btn-action {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            font-size: 16px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            active: pointer;
            touch-action: manipulation;
            color: #fff;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
            transition: all 0.05s;
        }

        .btn-a {
            background: linear-gradient(135deg, #ff6b6b, #ee5a6f);
            width: 70px;
            height: 70px;
            font-size: 18px;
        }

        .btn-b {
            background: linear-gradient(135deg, #4ecdc4, #45b7b0);
        }

        .btn-action:active {
            transform: scale(0.92);
            box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.6);
        }

        /* Botones L/R y Select/Start */
        .shoulder-btns {
            display: flex;
            gap: 8px;
            align-items: center;
            justify-content: center;
            width: 100%;
            grid-column: 1 / 4;
        }

        .shoulder-btn {
            flex: 1;
            padding: 10px;
            background: linear-gradient(135deg, #95e1d3, #7dd3c0);
            border: 2px solid #666;
            border-radius: 6px;
            color: #000;
            font-weight: bold;
            font-size: 11px;
            cursor: pointer;
            active: pointer;
            touch-action: manipulation;
        }

        .shoulder-btn:active {
            transform: scale(0.95);
            background: linear-gradient(135deg, #7dd3c0, #6ecbb0);
        }

        .select-start-btns {
            flex: 1.5;
            display: flex;
            gap: 6px;
            align-items: center;
            justify-content: center;
        }

        .select-start-btn {
            flex: 1;
            padding: 8px 10px;
            background: linear-gradient(135deg, #f9ca24, #f0b90b);
            border: 2px solid #666;
            border-radius: 5px;
            color: #000;
            font-weight: bold;
            font-size: 10px;
            cursor: pointer;
            active: pointer;
            touch-action: manipulation;
        }

        .select-start-btn:active {
            transform: scale(0.95);
        }

        /* Menú flotante */
        .menu-button {
            position: fixed;
            bottom: 10px;
            right: 10px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            active: pointer;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .menu-button:active {
            transform: scale(0.95);
        }

        /* Modal */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.95);
            display: none;
            flex-direction: column;
            z-index: 1000;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .modal.active {
            display: flex;
        }

        .modal-header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            border-bottom: 2px solid #555;
        }

        .modal-title {
            font-size: 18px;
            font-weight: bold;
            color: #fff;
        }

        .close-btn {
            background: none;
            border: none;
            color: #fff;
            font-size: 24px;
            cursor: pointer;
            active: pointer;
            padding: 5px;
        }

        .modal-content {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .modal-section {
            margin-bottom: 20px;
        }

        .modal-section h3 {
            color: #667eea;
            font-size: 14px;
            margin-bottom: 10px;
            text-transform: uppercase;
            border-bottom: 1px solid #333;
            padding-bottom: 8px;
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #222;
            font-size: 13px;
        }

        .info-label {
            color: #95e1d3;
            font-weight: bold;
        }

        .info-value {
            color: #999;
        }

        .control-item {
            margin-bottom: 12px;
        }

        .control-label {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            font-size: 13px;
            color: #ccc;
        }

        .control-label input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #667eea;
        }

        .control-label input[type="range"] {
            flex: 1;
            cursor: pointer;
            height: 5px;
            -webkit-appearance: none;
            appearance: none;
            background: #333;
            border-radius: 5px;
            outline: none;
        }

        .control-label input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            background: #667eea;
            border-radius: 50%;
            cursor: pointer;
        }

        .control-label input[type="range"]::-moz-range-thumb {
            width: 16px;
            height: 16px;
            background: #667eea;
            border-radius: 50%;
            cursor: pointer;
            border: none;
        }

        .rom-loader {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        #romFile {
            display: none;
        }

        .file-input-label {
            display: block;
            padding: 12px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 6px;
            text-align: center;
            font-weight: bold;
            cursor: pointer;
            font-size: 13px;
            color: #fff;
        }

        .load-rom-btn {
            padding: 12px;
            background: linear-gradient(135deg, #4ecdc4, #45b7b0);
            border: none;
            border-radius: 6px;
            color: #fff;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
            active: pointer;
        }

        .load-rom-btn:active {
            transform: scale(0.95);
        }

        .reset-btn {
            padding: 12px;
            background: linear-gradient(135deg, #ff6b6b, #ee5a6f);
            border: none;
            border-radius: 6px;
            color: #fff;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
            active: pointer;
            width: 100%;
        }

        .reset-btn:active {
            transform: scale(0.95);
        }

        .rom-note {
            font-size: 11px;
            color: #999;
            text-align: center;
        }

        /* Optimización para iOS */
        @supports (padding: max(0px)) {
            body {
                padding-top: max(0px, env(safe-area-inset-top));
                padding-bottom: max(0px, env(safe-area-inset-bottom));
                padding-left: max(0px, env(safe-area-inset-left));
                padding-right: max(0px, env(safe-area-inset-right));
            }

            .menu-button {
                bottom: max(10px, env(safe-area-inset-bottom));
                right: max(10px, env(safe-area-inset-right));
            }
        }

        /* Orientación horizontal */
        @media (orientation: landscape) {
            .status-bar {
                padding: 5px 10px;
                font-size: 11px;
            }

            .controls-bar {
                min-height: 110px;
                padding: 8px;
            }

            .dpad-btn {
                width: 40px;
                height: 40px;
                font-size: 16px;
            }

            .btn-action {
                width: 55px;
                height: 55px;
            }

            .btn-a {
                width: 60px;
                height: 60px;
                font-size: 16px;
            }

            .shoulder-btn,
            .select-start-btn {
                padding: 8px;
                font-size: 10px;
            }
        }
    </style>
</head>
<body>
    <!-- Status Bar -->
    <div class="status-bar">
        <div class="status-left">
            <span class="game-title">🎮 Pokémon FireRed</span>
            <span id="statusText">Cargando...</span>
        </div>
        <div class="status-right">
            <span id="fpsText">60 FPS</span>
        </div>
    </div>

    <!-- Game Screen -->
    <div class="game-screen">
        <canvas id="gbaScreen" width="240" height="160"></canvas>
        <div class="loading-overlay" id="loadingOverlay">
            <div class="spinner"></div>
            <div class="loading-text">Inicializando emulador...</div>
        </div>
    </div>

    <!-- Controls Bar -->
    <div class="controls-bar">
        <!-- D-Pad -->
        <div class="dpad-container">
            <div class="dpad-row">
                <div class="dpad-spacer"></div>
                <button class="dpad-btn" id="btn-up" data-key="ArrowUp">▲</button>
                <div class="dpad-spacer"></div>
            </div>
            <div class="dpad-row">
                <button class="dpad-btn" id="btn-left" data-key="ArrowLeft">◀</button>
                <div class="dpad-spacer"></div>
                <button class="dpad-btn" id="btn-right" data-key="ArrowRight">▶</button>
            </div>
            <div class="dpad-row">
                <div class="dpad-spacer"></div>
                <button class="dpad-btn" id="btn-down" data-key="ArrowDown">▼</button>
                <div class="dpad-spacer"></div>
            </div>
        </div>

        <!-- Botones de acción -->
        <div class="action-btns">
            <button class="btn-action btn-b" id="btn-b" data-key="z">B</button>
            <button class="btn-action btn-a" id="btn-a" data-key="x">A</button>
        </div>

        <!-- Botones secundarios -->
        <div>
            <div class="shoulder-btns">
                <button class="shoulder-btn" id="btn-l" data-key="q">L</button>
                <div class="select-start-btns">
                    <button class="select-start-btn" id="btn-select" data-key="Enter">SEL</button>
                    <button class="select-start-btn" id="btn-start" data-key=" ">STR</button>
                </div>
                <button class="shoulder-btn" id="btn-r" data-key="w">R</button>
            </div>
        </div>
    </div>

    <!-- Menu Button -->
    <button class="menu-button" id="menuBtn">⚙️</button>

    <!-- Modal Menu -->
    <div class="modal" id="menuModal">
        <div class="modal-header">
            <span class="modal-title">Menú</span>
            <button class="close-btn" id="closeMenuBtn">✕</button>
        </div>
        <div class="modal-content">
            <!-- Info Section -->
            <div class="modal-section">
                <h3>Información</h3>
                <div class="info-item">
                    <span class="info-label">ROM:</span>
                    <span class="info-value" id="romInfo">Pokémon FireRed</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Estado:</span>
                    <span class="info-value" id="stateInfo">Ejecutando</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Frames:</span>
                    <span class="info-value" id="frameInfo">0</span>
                </div>
            </div>

            <!-- Controles Section -->
            <div class="modal-section">
                <h3>Controles</h3>
                <div class="control-item">
                    <label class="control-label">
                        <span>Velocidad:</span>
                        <input type="range" id="speedSlider" min="0.5" max="2" step="0.1" value="1">
                        <span id="speedValue" style="min-width: 30px; color: #667eea;">1.0x</span>
                    </label>
                </div>
                <div class="control-item">
                    <label class="control-label">
                        <input type="checkbox" id="audioToggle" checked>
                        <span>Audio</span>
                    </label>
                </div>
                <div class="control-item">
                    <label class="control-label">
                        <input type="checkbox" id="vibrationToggle" checked>
                        <span>Vibración</span>
                    </label>
                </div>
                <div class="control-item">
                    <label class="control-label">
                        <span>Brillo:</span>
                        <input type="range" id="brightnessSlider" min="50" max="150" value="100">
                        <span id="brightnessValue" style="min-width: 30px; color: #667eea;">100%</span>
                    </label>
                </div>
            </div>

            <!-- ROM Section -->
            <div class="modal-section">
                <h3>Cargar ROM</h3>
                <div class="rom-loader">
                    <input type="file" id="romFile" accept=".gba,.bin,.rom">
                    <label for="romFile" class="file-input-label">📁 Seleccionar Archivo</label>
                    <button class="load-rom-btn" id="loadRomBtn">Cargar ROM</button>
                    <p class="rom-note">Formato: .gba, .bin, .rom</p>
                </div>
            </div>

            <!-- Actions Section -->
            <div class="modal-section">
                <button class="reset-btn" id="resetBtn">Reiniciar Juego</button>
            </div>
        </div>
    </div>

    <script>
        class GBAEmulatorMobile {
            constructor() {
                this.canvas = document.getElementById('gbaScreen');
                this.ctx = this.canvas.getContext('2d', { alpha: false });
                this.rom = null;
                this.memory = new Uint8Array(0x10000000);
                this.registers = new Uint32Array(16);
                this.pc = 0;
                this.sp = 0x03007F00;
                this.isRunning = false;
                this.frameCount = 0;
                this.soundEnabled = true;
                this.speed = 1;
                this.vibrationEnabled = true;
                this.cycles = 0;
                this.cyclesPerFrame = 280896 / 60;
                this.lastTime = performance.now();
                this.fps = 60;
                this.keyState = 0;

                this.initializeUI();
                this.initializeControls();
                this.initializeTouchControls();
                this.initializeSettings();
                this.loadDefaultRom();
                this.startFpsMonitor();
                this.preventZoom();
            }

            preventZoom() {
                document.addEventListener('gesturestart', (e) => e.preventDefault(), false);
                document.addEventListener('touchmove', (e) => {
                    if (e.touches.length > 1) e.preventDefault();
                }, { passive: false });
            }

            initializeUI() {
                document.getElementById('menuBtn').addEventListener('click', () => {
                    document.getElementById('menuModal').classList.add('active');
                });

                document.getElementById('closeMenuBtn').addEventListener('click', () => {
                    document.getElementById('menuModal').classList.remove('active');
                });

                document.getElementById('loadRomBtn').addEventListener('click', () => {
                    this.loadRomFile();
                });

                document.getElementById('resetBtn').addEventListener('click', () => {
                    this.resetGame();
                    document.getElementById('menuModal').classList.remove('active');
                });
            }

            initializeControls() {
                document.addEventListener('keydown', (e) => {
                    this.updateKeyState(e.key, true);
                });

                document.addEventListener('keyup', (e) => {
                    this.updateKeyState(e.key, false);
                });
            }

            initializeTouchControls() {
                const buttons = document.querySelectorAll('.dpad-btn, .btn-action, .shoulder-btn, .select-start-btn');
                buttons.forEach(btn => {
                    btn.addEventListener('touchstart', (e) => {
                        e.preventDefault();
                        const key = btn.getAttribute('data-key');
                        this.updateKeyState(key, true);
                        btn.style.opacity = '0.7';
                        this.vibrate(20);
                    });

                    btn.addEventListener('touchend', (e) => {
                        e.preventDefault();
                        const key = btn.getAttribute('data-key');
                        this.updateKeyState(key, false);
                        btn.style.opacity = '1';
                    });
                });
            }

            updateKeyState(key, pressed) {
                const keyMap = {
                    'ArrowUp': 0, 'ArrowDown': 1, 'ArrowLeft': 2, 'ArrowRight': 3,
                    'z': 4, 'x': 5, 'q': 6, 'w': 7, 'Enter': 8, ' ': 9
                };

                const bit = keyMap[key];
                if (bit !== undefined) {
                    if (pressed) {
                        this.keyState |= (1 << bit);
                    } else {
                        this.keyState &= ~(1 << bit);
                    }
                }
            }

            vibrate(duration = 50) {
                if (!this.vibrationEnabled) return;
                if (navigator.vibrate) {
                    navigator.vibrate(duration);
                }
            }

            initializeSettings() {
                document.getElementById('speedSlider').addEventListener('change', (e) => {
                    this.speed = parseFloat(e.target.value);
                    document.getElementById('speedValue').textContent = this.speed.toFixed(1) + 'x';
                });

                document.getElementById('audioToggle').addEventListener('change', (e) => {
                    this.soundEnabled = e.target.checked;
                });

                document.getElementById('vibrationToggle').addEventListener('change', (e) => {
                    this.vibrationEnabled = e.target.checked;
                });

                document.getElementById('brightnessSlider').addEventListener('change', (e) => {
                    const brightness = e.target.value;
                    document.getElementById('brightnessValue').textContent = brightness + '%';
                    this.canvas.style.filter = `brightness(${brightness}%)`;
                });
            }

            loadRomFile() {
                const fileInput = document.getElementById('romFile');
                const file = fileInput.files[0];

                if (!file) {
                    this.updateStatus('Selecciona un archivo');
                    return;
                }

                const reader = new FileReader();
                reader.onload = (e) => {
                    this.rom = new Uint8Array(e.target.result);
                    for (let i = 0; i < Math.min(this.rom.length, 0x8000000); i++) {
                        this.memory[0x08000000 + i] = this.rom[i];
                    }

                    document.getElementById('romInfo').textContent = file.name;
                    this.pc = 0x08000000;
                    this.startEmulation();
                    document.getElementById('menuModal').classList.remove('active');
                };
                reader.readAsArrayBuffer(file);
            }

            loadDefaultRom() {
                fetch('Pokemon - FireRed Version (USA).gba')
                    .then(response => response.arrayBuffer())
                    .then(arrayBuffer => {
                        this.rom = new Uint8Array(arrayBuffer);
                        for (let i = 0; i < Math.min(this.rom.length, 0x8000000); i++) {
                            this.memory[0x08000000 + i] = this.rom[i];
                        }
                        this.pc = 0x08000000;
                        this.startEmulation();
                        document.getElementById('loadingOverlay').classList.add('hidden');
                    })
                    .catch(() => {
                        document.getElementById('statusText').textContent = 'Carga una ROM';
                        document.getElementById('loadingOverlay').classList.add('hidden');
                    });
            }

            startEmulation() {
                if (this.isRunning) return;
                this.isRunning = true;
                this.updateStatus('Jugando');
                this.emulate();
            }

            emulate() {
                if (!this.isRunning || !this.rom) return;

                const frameStart = performance.now();
                const targetCycles = this.cyclesPerFrame * this.speed;

                for (let i = 0; i < targetCycles; i++) {
                    this.executeCycle();
                }

                this.render();
                this.frameCount++;

                requestAnimationFrame(() => this.emulate());
            }

            executeCycle() {
                if (!this.rom || this.pc >= 0x08000000 + this.rom.length) return;
                this.pc += 4;
            }

            render() {
                const imageData = this.ctx.createImageData(240, 160);
                const data = imageData.data;

                let idx = 0;
                for (let i = 0; i < 240 * 160; i++) {
                    const addr = 0x06000000 + (i * 2);
                    const color16 = this.memory[addr] | (this.memory[addr + 1] << 8);

                    const b = (color16 & 0x001F) << 3;
                    const g = ((color16 & 0x03E0) >> 5) << 3;
                    const r = ((color16 & 0x7C00) >> 10) << 3;

                    data[idx++] = r;
                    data[idx++] = g;
                    data[idx++] = b;
                    data[idx++] = 255;
                }

                this.ctx.putImageData(imageData, 0, 0);
            }

            resetGame() {
                this.isRunning = false;
                this.pc = 0x08000000;
                this.registers.fill(0);
                this.frameCount = 0;
                this.startEmulation();
                this.vibrate(100);
            }

            startFpsMonitor() {
                setInterval(() => {
                    document.getElementById('fpsText').textContent = this.frameCount + ' FPS';
                    document.getElementById('frameInfo').textContent = this.frameCount;
                    this.frameCount = 0;
                }, 1000);
            }

            updateStatus(message) {
                document.getElementById('statusText').textContent = message;
                document.getElementById('stateInfo').textContent = message;
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            window.emulator = new GBAEmulatorMobile();
        });
    </script>
</body>
</html>
